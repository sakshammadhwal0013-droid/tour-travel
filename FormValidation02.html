<html>
    <head>
        <title>Liberary System</title>
        <link rel="stylesheet" href="FormValidation02.css" >
    </head>
    <body>
        <h1>Library System</h1>
        <table>
            <tr> 
                <td>First Name:</td>
                <td><input type="text" id="firstname" placeholder="Abc..." class="input" >
                <span id="fnamevalidation"></span></td>
                <td  class="th changecolor">Submitted Information</td>
            </tr>
            <tr>
                <td>Last Name:</th>
                <td><input type="text" id="lastname" placeholder="Xyz..."  class="input">
                <span id="lnamevalidation"></span></td>
                <td   class="th">First Name:</td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" id="email" placeholder="Abc..."  class="input">
                <span id="emailvalidation"></span></td>
                <td   class="th">Last Name:</td>
            </tr>
            <tr>
                <td>Phone Number:</td>
                <td><input type="number" id="phoneno" placeholder="+91-00000-00000"  class="input">
                <span id="phonevalidation"></span></td>
                <td   class="th">Email:</td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><input type="text" id="firstname" spellcheck="true" placeholder="Bilaspur(HP)"  class="input">
                <span id="addressvalidation"></span></td>
                <td class="th">Phone:</td>
            </tr>
            <tr>
                <td>Course:</td>
                <td>
                    <select>
                        <option>9th</option>
                        <option>10th</option>
                        <option>11th</option>
                        <option>12th</option>
                    </select>
                    <span id="coursevalidation"></span>
                </td>
                <td class="th">Address:</td>
            </tr>
            <tr>
                <td>Subjects:</td>
                <td>
                    <input type="checkbox" id="subject" value="hindi">Hindi
                    <input type="checkbox" id="subject" value="English">English
                    <input type="checkbox" id="subject" value="SST">SST
                    <input type="checkbox" id="subject" value="science">Science
                    <input type="checkbox" id="subject" value="math">Math
                    <span id="subjectvalidation"></span>
                </td>
                <td class="th">Course:</td>
            </tr>
            <tr>
                <td>Time period:</td>
                <td>
                    <select>
                        <option>1 day</option>
                        <option>2 day</option>
                        <option>3 day</option>
                        <option>4 day</option>
                    </select>
                    <span id="timevalidation"></span>
                </td>
                <td  class="th">Selected Subject:</td>
            </tr>
            <tr>
                <td>Submission Date:</td>
                <td><input type="text" id="date" placeholder="dd-mm-yyyy" class="input"> 
                <span id="datevalidation"></span></td>
                <td  class="th">Submission Date:</td>
            </tr>
            <tr>
                <td></td>
                <td class="buttonalign">
                    <input type="button" value="Submit" class="button" onclick="validation()">
                </td>
            </tr>
        </table><br>

    </body>
    <script src="FormValidation02.js"></script>
</html>
